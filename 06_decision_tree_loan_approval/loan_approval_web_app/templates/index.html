<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>🏦 Loan Approval Prediction</h2>
        <form action="/predict" method="post">

            <input type="number" name="Age" placeholder="Age" required>
            <select name="Gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
            <select name="MaritalStatus" required>
                <option value="">Select Marital Status</option>
                <option value="Single">Single</option>
                <option value="Married">Married</option>
                <option value="Divorced">Divorced</option>
                <option value="Widowed">Widowed</option>
            </select>
            <select name="EducationLevel" required>
                <option value="">Select Education Level</option>
                <option value="High School">High School</option>
                <option value="Bachelor">Bachelor</option>
                <option value="Master">Master</option>
                <option value="PhD">PhD</option>
                <option value="Other">Other</option>
            </select>
            <select name="EmploymentStatus" required>
                <option value="">Select Employment Status</option>
                <option value="Employed">Employed</option>
                <option value="Self-employed">Self-employed</option>
                <option value="Unemployed">Unemployed</option>
                <option value="Student">Student</option>
                <option value="Retired">Retired</option>
            </select>
            <input type="number" name="AnnualIncome" placeholder="Annual Income" required>
            <input type="number" name="LoanAmountRequested" placeholder="Loan Amount" required>
            <input type="number" name="CreditScore" placeholder="Credit Score" required>
            <input type="number" name="ExistingLoansCount" placeholder="Existing Loans Count" required>
            <input type="number" name="LatePaymentsLastYear" placeholder="Late Payments Last Year" required>

            <button type="submit">Predict</button>
        </form>

        {% if prediction_text %}
            <h3>{{ prediction_text }}</h3>
        {% endif %}
    </div>
</body>
</html>
